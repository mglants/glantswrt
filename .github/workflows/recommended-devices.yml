name: Recommended Devices

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    paths:
      - ".ci/scripts/toh_recommend.py"
      - ".github/workflows/recommended-devices.yml"

jobs:
  render-recommended-devices:
    name: Render recommended-devices.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Short Lived OAuth App Token (ghs_*)
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        id: app-token
        with:
          app-id: "${{ secrets.MGLANTS_APP_ID }}"
          private-key: "${{ secrets.MGLANTS_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Generate recommended-devices.md
        working-directory: .ci/scripts
        run: |
          python3 toh_recommend.py --format markdown > ../../recommended-devices.md

      - name: Commit recommended-devices.md
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        with:
          commit_message: "chore: regenerate recommended-devices.md [skip ci]"
          repo: ${{ github.repository }}
          branch: main
          empty: false
          file_pattern: "./recommended-devices.md"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
